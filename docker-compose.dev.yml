version: "3.8"

services:
  vert:
    image: ghcr.io/vert-sh/vert:latest
    container_name: vert-internal-dev
    ports:
      - "3003:80"
    environment:
      - PUB_HOSTNAME=localhost:3003
      - PUB_ENV=development
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:80",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
