# Netlify reads this file automatically — leave Site settings → Build empty (no overrides).
# Repo root is the build base; output is /dist (not apps/web/dist).

[build]
  command = "npm run build:netlify"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=optional"

# SPA: client-side routes + deep links
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
