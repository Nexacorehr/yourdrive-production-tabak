# Netlify reads this file automatically — leave Site settings → Build empty (no overrides).
# Repo root is the build base; output is /dist (not apps/web/dist).

[build]
  command = "npm run build:netlify"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=optional"

# /api proxy + SPA fallback: generated in apps/web/public/_redirects by scripts/prepare-netlify.mjs
# (requires NETLIFY_API_PROXY_URL in Netlify env when using Render API)
